version: '3.8'

services:
  nginx:
    container_name: mimir-lb
    image: nginxinc/nginx-unprivileged:alpine@sha256:601c823234c474696ded03d619e67f1e59538802731543099c691aea67e4a553
    volumes:
      - /volume1/docker/mimir/nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - 30909:9009
    restart: always
    depends_on:
      - mimir-1
      - mimir-2
      - mimir-3

  mimir-1: &mimirConf
    container_name: mimir-1
    hostname: mimir-1
    image: grafana/mimir:3.0.4@sha256:686138d9f941508c99c931cc9e69bf9f6100dd4d2d623bf57b38d5c25ee645c1
    working_dir: /data/mimir
    command: 
      - -config.file=/etc/mimir.yaml
      - -config.expand-env=true
    env_file:
      - /volume1/docker/mimir/.env
    volumes:
      - &config
        /volume1/docker/mimir/config.yaml:/etc/mimir.yaml:ro
      - &runtime
        /volume1/docker/mimir/runtime.yaml:/etc/runtime.yaml:ro
      - &amConf
        /volume1/docker/mimir/alertmanager.yaml:/etc/alertmanager/alertmanager.yaml:ro
      - &amMixins
        /volume1/docker/mimir/mixins:/etc/alertmanager/mixins:ro
      - &amEmail
        /volume1/docker/mimir/email_token.txt:/var/run/secrets/email_token.txt:ro
      - &amDiscord
        /volume1/docker/mimir/discord_webhook.txt:/var/run/secrets/discord_webhook.txt:ro
      - mimir-data-1:/data/mimir
    restart: always

  mimir-2:
    <<: *mimirConf
    container_name: mimir-2
    hostname: mimir-2
    volumes:
      - *config
      - *runtime
      - *amConf
      - *amEmail
      - *amDiscord
      - mimir-data-2:/data/mimir
    depends_on:
      - mimir-1
  
  mimir-3:
    <<: *mimirConf
    container_name: mimir-3
    hostname: mimir-3
    volumes:
      - *config
      - *runtime
      - *amConf
      - *amEmail
      - *amDiscord
      - mimir-data-3:/data/mimir
    depends_on:
      - mimir-1
      - mimir-2

volumes:
  mimir-data-1:
  mimir-data-2:
  mimir-data-3:
