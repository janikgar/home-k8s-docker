services:
  autoheal:
    container_name: autoheal
    image: willfarrell/autoheal:latest@sha256:88fcadea274c0e2ed625b7c0a346cf7f41168b01200faf664560070fc04d23f2
    environment:
      AUTOHEAL_CONTAINER_LABEL: all
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /etc/localtime:/etc/localtime:ro
    restart: always
    network_mode: none
