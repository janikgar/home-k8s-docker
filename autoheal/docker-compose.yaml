services:
  autoheal:
    container_name: autoheal
    image: willfarrell/autoheal:latest@sha256:7ab2ddc7ec5f5933fd5d92df8d0feb928b185fc50d62a3e215d1c40fb21ab9c9
    environment:
      AUTOHEAL_CONTAINER_LABEL: all
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /etc/localtime:/etc/localtime:ro
    restart: always
    network_mode: none
