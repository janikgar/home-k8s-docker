services:
  autoheal:
    container_name: autoheal
    image: willfarrell/autoheal:latest@sha256:3ebfce8a85966a971754b98128de9c7b8c92920c312b7f7d1389d8735600c990
    environment:
      AUTOHEAL_CONTAINER_LABEL: all
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /etc/localtime:/etc/localtime:ro
    restart: always
    network_mode: none
