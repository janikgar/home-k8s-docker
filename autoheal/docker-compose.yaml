services:
  autoheal:
    container_name: autoheal
    image: willfarrell/autoheal:latest@sha256:68682336a174908043e60d36c78353b187863f457ee0f65f726557310b4a94b8
    environment:
      AUTOHEAL_CONTAINER_LABEL: all
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /etc/localtime:/etc/localtime:ro
    restart: always
    network_mode: none
