services:
  autoheal:
    container_name: autoheal
    image: willfarrell/autoheal:latest@sha256:fed5f7a2ac719bbb4c145f42c8c89daeacf0ad179a631ee50ca7b154f1e8a489
    environment:
      AUTOHEAL_CONTAINER_LABEL: all
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /etc/localtime:/etc/localtime:ro
    restart: always
    network_mode: none
