services:
  autoheal:
    container_name: autoheal
    image: willfarrell/autoheal:latest@sha256:9be9bcb4636b8894b74a0738d9e47624fb71364a2f7acc3dbedca459d0a6168a
    environment:
      AUTOHEAL_CONTAINER_LABEL: all
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /etc/localtime:/etc/localtime:ro
    restart: always
    network_mode: none
