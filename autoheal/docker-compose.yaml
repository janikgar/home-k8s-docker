services:
  autoheal:
    container_name: autoheal
    image: willfarrell/autoheal:latest@sha256:f5b1293a4309a8a3ce2480b6739dd3320084b244f90316ce441edc112d07d791
    environment:
      AUTOHEAL_CONTAINER_LABEL: all
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /etc/localtime:/etc/localtime:ro
    restart: always
    network_mode: none
