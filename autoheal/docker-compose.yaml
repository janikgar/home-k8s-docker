services:
  autoheal:
    container_name: autoheal
    image: willfarrell/autoheal:latest@sha256:a839c363f8306978abe9787c1d002cfbe68c713a502a342ae13c690e6e802dd2
    environment:
      AUTOHEAL_CONTAINER_LABEL: all
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /etc/localtime:/etc/localtime:ro
    restart: always
    network_mode: none
