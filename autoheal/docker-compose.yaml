services:
  autoheal:
    container_name: autoheal
    image: willfarrell/autoheal:latest@sha256:feb5427b566b8652143fe8cdd43c07650f97f72618db282ed63a008e18202933
    environment:
      AUTOHEAL_CONTAINER_LABEL: all
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /etc/localtime:/etc/localtime:ro
    restart: always
    network_mode: none
