services:
  autoheal:
    container_name: autoheal
    image: willfarrell/autoheal:latest@sha256:bf42cbd04e08857efd20a3addf7a30c675a26f5a1605aaf59cece28b655dd26e
    environment:
      AUTOHEAL_CONTAINER_LABEL: all
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /etc/localtime:/etc/localtime:ro
    restart: always
    network_mode: none
