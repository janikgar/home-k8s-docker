services:
  autoheal:
    container_name: autoheal
    image: willfarrell/autoheal:latest@sha256:b82cf38ed46734df0fbc4c270a877e9383b0fca95c2c41f697f7fb5de25fbe3a
    environment:
      AUTOHEAL_CONTAINER_LABEL: all
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /etc/localtime:/etc/localtime:ro
    restart: always
    network_mode: none
