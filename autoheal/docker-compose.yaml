services:
  autoheal:
    container_name: autoheal
    image: willfarrell/autoheal:latest@sha256:f589bb9739fafd3d44c5e1ee8c11ac2b62b980e28608d80ce234195315fc0a09
    environment:
      AUTOHEAL_CONTAINER_LABEL: all
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /etc/localtime:/etc/localtime:ro
    restart: always
    network_mode: none
