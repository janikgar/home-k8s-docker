services:
  autoheal:
    container_name: autoheal
    image: willfarrell/autoheal:latest@sha256:d9a7db2f75142e7e169ec34fca536e645fb3361e5fd0f1d945ad99ad31d12d95
    environment:
      AUTOHEAL_CONTAINER_LABEL: all
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /etc/localtime:/etc/localtime:ro
    restart: always
    network_mode: none
