services:
  autoheal:
    container_name: autoheal
    image: willfarrell/autoheal:latest@sha256:de2c9557c15dc86fa44f73d7371c2de2feb595b2fcec0edd6949148c74111cc0
    environment:
      AUTOHEAL_CONTAINER_LABEL: all
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /etc/localtime:/etc/localtime:ro
    restart: always
    network_mode: none
