services:
  autoheal:
    container_name: autoheal
    image: willfarrell/autoheal:latest@sha256:c5e00b323f084b3495a510da692b56bb2cccbc414102e1c327cd621fddf2900f
    environment:
      AUTOHEAL_CONTAINER_LABEL: all
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /etc/localtime:/etc/localtime:ro
    restart: always
    network_mode: none
