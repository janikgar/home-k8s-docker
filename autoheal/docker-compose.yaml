services:
  autoheal:
    container_name: autoheal
    image: willfarrell/autoheal:latest@sha256:5fac5c11ae48047ee09e2c838f0fcc0d62289cb14a891b93b265e9227a743740
    environment:
      AUTOHEAL_CONTAINER_LABEL: all
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /etc/localtime:/etc/localtime:ro
    restart: always
    network_mode: none
