services:
  wealthfolio:
    ports:
      - '8088:8088'
    container_name: wealthfolio
    image: ghcr.io/wealthfolio/wealthfolio:3.6.2@sha256:88240e6bb218a7599a482d954722a68f54567e9e60e460f21981d224f36675bd
    env_file: .env
    environment:
      WF_DB_PATH: /data/wealthfolio.db
      WF_LISTEN_ADDR: 0.0.0.0:8088
      WF_CORS_ALLOW_ORIGINS: http://localhost:8088
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O/dev/null localhost:8088/api/v1/healthz"]
      interval: 1m
      timeout: 10s
      retries: 3
      start_period: 30s
    volumes:
      - ./data:/data
    restart: always
